spring.application.name=WordMage
server.port=${PORT:8080}

# 加载本地私密配置（API Key 等，见 application-local.properties）
spring.config.import=optional:classpath:application-local.properties

# 大模型配置：zhipu（智谱AI）或 qwen（通义千问）；未配置 API Key 时使用演示模式
wordmage.llm.provider=zhipu
wordmage.llm.api-key=${ZHIPU_API_KEY:}
wordmage.llm.model=glm-4-flash
wordmage.llm.qwen-api-key=${QWEN_API_KEY:}
wordmage.llm.qwen-model=qwen-turbo
